<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>End Devices</title>
    <style>
        .nav-header {
            background: #333;
            color: white;
            padding: 10px 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .nav-header a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: bold;
        }
        .nav-header a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="nav-header">
        <a href="/admin/">← Back to Admin Home</a>
    </div>
    <h1>End Device List</h1>
    <ul>
    {% for index, ed in end_device_list.items() %}
        <li>{{ index }} {{ ed.lfdi }}<br/>
            <ul>
            {% for k, v in ed.__dict__.items() %}
                <li>{{ k }} => {{ v }}</li>
            {% endfor %}
            </ul>
        </li>
    {% endfor %}
    </ul>
</body>
</html>
