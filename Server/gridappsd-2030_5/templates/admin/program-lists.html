<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Program Lists</title>
    <style>
        .nav-header {
            background: #333;
            color: white;
            padding: 10px 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .nav-header a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: bold;
        }
        .nav-header a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="nav-header">
        <a href="/admin/">← Back to Admin Home</a>
    </div>
    <div id="title">Program Lists</div>
    <div id="contentwrapper">
        <ul>
            {% for pl in program_lists  %}
            <li>
                {{ pl.name }}
                <ul>
                {% for p in pl.programs  %}
                <li>
                    {{  p.mRID  }}, {{ p.description  }}<br/>
                    <ul>
                    {% for k, v in p.__dict__.items()  %}
                    <li>{{ k }} => {{ v }}</li>
                    {% endfor %}
                    </ul>
                </li>
                {% endfor %}
                </ul>
            </li>
            {% endfor %}

        </ul>
    </div>


</body>
</html>
