devices:
  - id: dev1
    deviceCategory: PHOTOVOLTAIC_SYSTEM
    pin: 111115
    programs:
      - description: Microinverter Program 1
    ders:
      - capabilities:
        modesSupported: "0011001011111100"
        type: 4
        rtgMaxW: 295
        rtgMaxVA: 295
        rtgMaxVar: 155
        rtgMaxVarNeg: 155
        rtgVNom: 240
        rtgMaxV: 264
        rtgMinV: 211
        rtgNormalCategory: 2
        rtgAbnormalCategory: 2
        mfID: "ENPHASE"
        mfModel: "IQ7PLUS-72-2-US"
        mfSerNum: "SN20241101001"
        mfHwVer: "2.0"
        swVer: "1.0"

programs:
  - description: Microinverter Default Control
    # -------------------------------------------------------
      # DEFAULT CONTROL - Normal operating behavior
      # -------------------------------------------------------        
    primacy: 89
    DefaultDERControl: 
      setESDelay: 300
      setGradW: 100         # 1% of rated capacity per second, taking 100 s to go from 0 to full output
      DERControlBase:
        opModConnect: true
        opModEnergize: true
        opModMaxLimW: 295
        setESDelay: 300       # Wait 5 minutes to reconnect to the grid to ensure that its stable
        setSoftGradW: 50      # Soft start ramp up for when the microinverter first reconnects after a delay
        setESHighFreq: 6010   # f = 60.10 Hz, upper limit
        setESLowFreq: 5990    # f = 59.90 Hz, lower limit
        setESHighVolt: 26400  # Vnom = 264.00 V, upper limit specified by Enphase
        setESLowVolt: 21100   # Vnom = 211.00 V, lower limit
        setESRandomDelay: 300  #***From Brown: some of the parameters might belong in DefaultDERControl instead of DERControlBase, but I put them here for now since they apply to all the controls and we can always move them later if needed.  The random delay is important to prevent a large number of devices from all reconnecting at the same time after an outage or fault clearance, which could cause grid instability.  A 5 minute random delay means that devices will reconnect randomly over a 5 minute window after the initial 5 minute ESDelay, which should help ensure a stable reconnection process.
        setESRampTms: 60000   # t = 600.00 seconds, 10 minute ramp up after service delay expires (ESDelay)

  # -------------------------------------------------------
  # PEAK SHAVING 75% - Light curtailment
  # Reduces Max Power Output by 25% (295 W -> 221 W)
  # -------------------------------------------------------
  - description: Microinverter Peak Shaving 75 pct Control
    DERControlBase:
      opModConnect: true
      opModEnergize: true
      opModMaxLimW: 221
      setGradW: 300         # 3% per second, 30s rampup, faster than normal startup since we want to respond to the grid faster
      setESRandomDelay: 120 # 2 minute spread, slightly smaller window

  # -------------------------------------------------------
  # PEAK SHAVING 50% - Medium curtailment
  # Reduces max power output by 50% (295 W -> 148 W)
  # -------------------------------------------------------
  - description: Microinverter Peak Shaving 50 pct Control
    DERControlBase:
      opModConnect: true
      opModEnergize: true
      opModMaxLimW: 148
      setGradW: 500         # 5% per second, 20s rampup, more severe grid conditions need faster response
      setESRandomDelay: 60  # 1 minute spread, even smaller window

  # -------------------------------------------------------
  # PEAK SHAVING 25% - High curtailment
  # Reduces max power output by 75% (295 W -> 74 W)
  # -------------------------------------------------------
  - description: Microinverter Peak Shaving 25 pct Control
    DERControlBase:
      opModConnect: true
      opModEnergize: true
      opModMaxLimW: 74
      setGradW: 1000        # 10% per second, 10s rampup, extreme grid conditions need fast response
      setESRandomDelay: 30  # 30 second spread, urgent scenario needs a quick response

  # -------------------------------------------------------
  # EMERGENCY CURTAIL - Near-full shutdown
  # Reduces max power output by 95% (295 W -> 15 W)
  # -------------------------------------------------------
  - description: Microinverter Emergency Curtail Control
    DERControlBase:
      opModConnect: true
      opModEnergize: true
      opModMaxLimW: 15
      setGradW: 10000       # 100% per second, near-instant response
      # No ESRandomDelay because we need an immediate response

  # -------------------------------------------------------
  # FULL DISCONNECT
  # Disconnects inverter fully from the grid for maintenance
  # or scheduled nightly disconnect (no sun)
  # -------------------------------------------------------
  - description: Microinverter Full Disconnect Control
    DERControlBase:
      opModConnect: false   # disconnected from grid
      opModEnergize: false  # de-energized

  # -------------------------------------------------------
  # SOFT RECONNECT
  # Slow reconnection after fault clearance or outage recovery.
  # Tight reconnect margins with slow ramp ups to ensure
  # grid is stable on reconnection.
  # -------------------------------------------------------
  - description: Microinverter Soft Reconnect Control
    setESDelay: 300
    DERControlBase:
      opModConnect: true
      opModEnergize: true
      opModMaxLimW: 295
      setGradW: 5           # 0.05% per second ramp up, very slow
      setSoftGradW: 2       # 0.02% per second ramp up
      setESHighFreq: 6005   # f = 60.05 Hz, smaller upper limit to ensure grid is stable
      setESLowFreq: 5995    # f = 59.95 Hz
      setESHighVolt: 26000  # Vnom = 260 V, smaller upper limit to ensure grid is safe
      setESLowVolt: 22000   # Vnom = 220 V
      setESRandomDelay: 1200  # 20 min random reconnection spread
      setESRampTms: 120000    # 20 min ramp up to full power

curves:
  # -------------------------------------------------------
  # VOLT-VAR CURVE
  # Reactive power support based on voltage.
  # xvalue in hundredths of a volt, yvalue as % of rtgMaxVar.
  # -------------------------------------------------------
  - description: Microinverter VoltVar Curve
    curveType: opModVoltVar
    autonomousVRefEnable: True
    autonomousVRefTimeConstant: 30000  # 300 second adjustment time constant
    rampDecTms: 1000
    rampIncTms: 1000
    CurveData:
      - xvalue: 21100   # 211V - rtgMinV, critically low
        yvalue: 100     # inject max +155 VAR
      - xvalue: 22800   # 228V - low
        yvalue: 80      # inject +124 VAR
      - xvalue: 23400   # 234V - slightly low
        yvalue: 20      # inject +31 VAR
      - xvalue: 23600   # 236V - dead band lower edge
        yvalue: 0       # no adjustment
      - xvalue: 24400   # 244V - dead band upper edge
        yvalue: 0       # no adjustment
      - xvalue: 24600   # 246V - slightly high
        yvalue: -20     # absorb -31 VAR
      - xvalue: 25200   # 252V - high
        yvalue: -80     # absorb -124 VAR
      - xvalue: 26400   # 264V - rtgMaxV, critically high
        yvalue: -100    # absorb max -155 VAR

  # -------------------------------------------------------
  # VOLT-WATT CURVE
  # Real power curtailment to suppress high voltage.
  # Only activates above 244V, leaving full output
  # across the normal 211V to 244V operating range.
  # xvalue in hundredths of a volt, yvalue as % of rtgMaxW.
  # -------------------------------------------------------
  - description: Microinverter VoltWatt Curve
    curveType: opModVoltWatt
    rampDecTms: 500
    rampIncTms: 3000
    CurveData:
      - xvalue: 21100   # 211V - full output at low voltage
        yvalue: 100     # 295W
      - xvalue: 24400   # 244V - curtailment begins
        yvalue: 100     # still full 295W
      - xvalue: 25000   # 250V
        yvalue: 60      # 177W
      - xvalue: 25600   # 256V
        yvalue: 30      # 89W
      - xvalue: 26400   # 264V - rtgMaxV
        yvalue: 0       # 0W full curtailment

  # -------------------------------------------------------
  # FREQUENCY-WATT CURVE
  # Output reduction as grid frequency rises above 60Hz.
  # Extended frequency range per datasheet: 49Hz to 68Hz.
  # xvalue in hundredths of Hz, yvalue as % of rtgMaxW.
  # -------------------------------------------------------
  - description: Microinverter FreqWatt Curve
    curveType: opModFreqWatt
    rampDecTms: 200
    rampIncTms: 1000
    CurveData:
      - xvalue: 4900    # 49.0 Hz - extended low limit per datasheet
        yvalue: 100     # maintain full output at low frequency
      - xvalue: 5990    # 59.9 Hz - near nominal
        yvalue: 100     # full 295W
      - xvalue: 6000    # 60.0 Hz - nominal
        yvalue: 100     # full output, no action
      - xvalue: 6003    # 60.03 Hz - just above nominal
        yvalue: 98      # very slight reduction begins
      - xvalue: 6010    # 60.1 Hz
        yvalue: 90      # 266W
      - xvalue: 6030    # 60.3 Hz
        yvalue: 70      # 207W
      - xvalue: 6060    # 60.6 Hz
        yvalue: 40      # 118W
      - xvalue: 6080    # 60.8 Hz
        yvalue: 15      # 44W
      - xvalue: 6100    # 61.0 Hz
        yvalue: 0       # cease output
      - xvalue: 6800    # 68.0 Hz - extended high limit per datasheet
        yvalue: 0       # remain off above 61Hz

  # -------------------------------------------------------
  # HVRT MUST TRIP CURVE
  # IEEE 1547:2018 Category II mandatory disconnection
  # thresholds for high voltage conditions.
  # xvalue in hundredths of a volt, yvalue in hundredths of a second.
  # -------------------------------------------------------
  - description: Microinverter HVRT MustTrip Curve
    curveType: opModHVRTMustTrip
    CurveData:
      - xvalue: 26400   # 264V - 110% of 240V nominal
        yvalue: 100000  # must trip within 1000 seconds
      - xvalue: 27600   # 276V - 115% nominal
        yvalue: 100     # must trip within 1 second
      - xvalue: 28800   # 288V - 120% nominal
        yvalue: 16      # must trip within 0.16 seconds

  # -------------------------------------------------------
  # LVRT MUST TRIP CURVE
  # IEEE 1547:2018 Category II mandatory disconnection
  # thresholds for low voltage conditions.
  # -------------------------------------------------------
  - description: Microinverter LVRT MustTrip Curve
    curveType: opModLVRTMustTrip
    CurveData:
      - xvalue: 21100   # 211V - 87.9% of 240V nominal
        yvalue: 100000  # must trip within 1000 seconds
      - xvalue: 17600   # 176V - 73% nominal
        yvalue: 500     # must trip within 5 seconds
      - xvalue: 14400   # 144V - 60% nominal
        yvalue: 16      # must trip within 0.16 seconds
      - xvalue: 5000    # 50V - near zero, line fault
        yvalue: 2       # must trip within 0.02 seconds

  # -------------------------------------------------------
  # HFRT MUST TRIP CURVE
  # Mandatory disconnection during sustained high frequency.
  # -------------------------------------------------------
  - description: Microinverter HFRT MustTrip Curve
    curveType: opModHFRTMustTrip
    CurveData:
      - xvalue: 6100    # 61.0 Hz - upper operating limit
        yvalue: 100000  # must trip within 1000 seconds
      - xvalue: 6200    # 62.0 Hz - severe
        yvalue: 100     # must trip within 1 second

  # -------------------------------------------------------
  # LFRT MUST TRIP CURVE
  # Mandatory disconnection during sustained low frequency.
  # Extended frequency range per datasheet goes down to 49Hz.
  # -------------------------------------------------------
  - description: Microinverter LFRT MustTrip Curve
    curveType: opModLFRTMustTrip
    CurveData:
      - xvalue: 5900    # 59.0 Hz - lower operating limit
        yvalue: 100000  # must trip within 1000 seconds
      - xvalue: 5700    # 57.0 Hz - severe low frequency
        yvalue: 100     # must trip within 1 second
      - xvalue: 4900    # 49.0 Hz - extended low limit per datasheet
        yvalue: 16      # must trip within 0.16 seconds
