server: 192.168.92.131
port: 8443
service_name: IEEE_2030_5
proxy_hostname: 192.168.92.132:8443
proxy_enabled: True

# Dual server configuration for HTTP admin access
dual_server_enabled: true
admin_http_port: 5002

tls_repository: "~/tls"
openssl_cnf: "openssl.cnf"

# enddevices_register_access_only
# enddevices_create_on_start
# enddevices_allow_all_access
server_mode: enddevices_create_on_start

# lfdi_mode: Determines what piece of information is used to calculate the lfdi
#
# Options:
#   lfdi_mode_from_file             - sha256 hash of certificate file's content.
#   lfdi_mode_from_cert_fingerprint - sha256 hash of the certificates fingerprint.
#
# default: lfdi_mode_from_cert_fingerprint
# lfdi_mode: lfdi_mode_from_file
lfdi_mode: lfdi_mode_from_cert_fingerprint

# Create an administrator certificate that can be used from
# browser/api to connect to the platform.
#
# this is important for the demo
generate_admin_cert: True

# These are all optional and default to 120 seconds.
log_event_list_poll_rate: 30
device_capability_poll_rate: 30
mirror_usage_point_post_rate: 30

device_capability: 30
end_device_list: 30
der_list: 30
der_program_list: 30
# Note: 'der_control_list' removed - DERControlList does not have pollRate per IEEE 2030.5
fsa_list: 30
mirror_usage_point: 30
usage_point: 30
registration: 30
log_event_list: 30
# Note: 'meter_reading' removed - MeterReadingList does not have pollRate per IEEE 2030.5
reading_set: 30
time: 30

poll_rate: 30

# Reset storage so no memory when server restarts.
cleanse_storage: false

# Directory containing data files for the platform.
storage_path: data_store

# Database backend configuration for point storage
# Options: "zodb" (default) or "sqlite"
database_backend: sqlite
database_path: "~/.ieee_2030_5_data/custom_points.db"

# Enable debug logging of all client requests/responses to individual files
debug_client_traffic: true

# Should every device have a der associated by default?
include_default_der_on_all_devices: True

# Make sure that all ders have a default program associated with it
include_default_der_program_on_ders: True

# The default program to use for all ders.
default_program:
  description: Default Program
  primacy: 89
  DefaultDERControl:
    setESDelay: 300       # Wait 5 minutes to reconnect to the grid to ensure that its stable
    setGradW: 100         # 1% of rated capacity per second, taking 100 s to go from 0 to full output
    setSoftGradW: 50      # Soft start ramp up for when the microinverter first reconnects after a delay
    setESHighFreq: 6010   # f = 60.10 Hz, upper limit
    setESLowFreq: 5990    # f = 59.90 Hz, lower limit
    setESHighVolt: 26400  # Vnom = 264.00 V, upper limit specified by Enphase
    setESLowVolt: 21100   # Vnom = 211.00 V, lower limit
    setESRandomDelay: 300
    setESRampTms: 60000   # t = 600.00 seconds, 10 minute ramp up after service delay expires (ESDelay)
    DERControlBase:
      opModConnect: true
      opModEnergize: true
      opModMaxLimW: 295

